name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: starter
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.txt
          pip install -e .

      - name: Lint with flake8
        working-directory: starter
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=sanitycheck.py
          flake8 . --count --max-complexity=10 --max-line-length=127 --statistics --exclude=sanitycheck.py

      - name: Train model
        working-directory: starter
        run: python -m starter.train_model

      - name: Run tests
        working-directory: starter
        run: pytest -v
